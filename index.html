<!DOCTYPE html>
<html>
<head>
  <title>Car Scanner</title>
</head>
<body>

<h1>Car Scanner</h1>
<button id="scanBtn">Scan Car</button>

<p id="engine"></p>
<p id="speed"></p>
<p id="fuel"></p>

<script>
// Cache DOM elements (avoid repeated lookups)
const scanBtn = document.getElementById("scanBtn");
const engineEl = document.getElementById("engine");
const speedEl = document.getElementById("speed");
const fuelEl = document.getElementById("fuel");

// Pre-allocate variables (avoid re-creation)
let engineStatus = "Good";
let speed = 60;
let fuelLevel = 45.5;

// Fast update function
function scanCar() {
  // No unnecessary objects or arrays
  engineEl.textContent = "Engine: " + engineStatus;
  speedEl.textContent = "Speed: " + speed;
  fuelEl.textContent = "Fuel: " + fuelLevel;
}

// Attach event once
scanBtn.addEventListener("click", scanCar);
</script>

</body>
</html>
